{% extends "auth/base_auth.html" %}

{% block auth_title %}E-mail envoyé{% endblock %}

{% block auth_main %}
<a class="auth-back" href="{% url 'auth:login' %}">← Retour à la connexion</a>

<div class="auth-success-card auth-stagger">
  <div class="auth-success-card__ico" aria-hidden="true">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--accent-moss)" stroke-width="1.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="M22 4 12 14.01l-3-3"/></svg>
  </div>
  <h2 class="auth-success-card__title">E-mail envoyé !</h2>
  <p class="auth-success-card__text">Vérifiez votre boîte mail. Le lien expire dans 24h.</p>
</div>

<div class="auth-divider" role="presentation"></div>
<p class="auth-legal">© {% now "Y" %} AESCULIA · Mentions légales · Politique de confidentialité</p>
{% endblock %}
